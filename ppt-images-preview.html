<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PPT画像プレビュー</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #222; color: white; }
    .image-container { margin-bottom: 40px; border: 2px solid #666; padding: 10px; background: #333; }
    img { max-width: 100%; height: auto; display: block; margin: 10px 0; }
    h2 { color: #4a9eff; }
  </style>
</head>
<body>
  <h1>PPTから抽出した画像</h1>
  
  <div class="image-container">
    <h2>image1.jpg (1920×1080)</h2>
    <img src="ppt_images/image1.jpg" alt="image1">
  </div>

  <div class="image-container">
    <h2>image2.jpg (1920×1080) - 選手写真</h2>
    <img src="ppt_images/image2.jpg" alt="image2">
  </div>

  <div class="image-container">
    <h2>image3.png (640×360)</h2>
    <img src="ppt_images/image3.png" alt="image3">
  </div>

  <div class="image-container">
    <h2>image4.png (286×286)</h2>
    <img src="ppt_images/image4.png" alt="image4">
  </div>
</body>
</html>
