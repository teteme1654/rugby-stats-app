<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選手紹介スライド - プロトタイプ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo', sans-serif;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .slide-container {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: white;
      transform: scale(0.5);
      transform-origin: center;
    }

    /* 背景画像 */
    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }



    /* 選手写真 */
    .player-photo {
      position: absolute;
      top: 50px;
      right: 100px;
      width: 500px;
      height: 700px;
      object-fit: cover;
      z-index: 5;
      
      /* 白背景除去 */
      mix-blend-mode: multiply;
    }

    /* コントロールパネル */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) scale(2);
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    .controls button {
      padding: 10px 20px;
      font-size: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 背景画像 -->
    <img src="stats/images/ui/bg_visitor.jpg" alt="Background" class="background">

    <!-- 選手写真 -->
    <img src="stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg" alt="選手写真" class="player-photo" id="playerPhoto">
  </div>

  <!-- コントロールパネル -->
  <div class="controls">
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg')">選手1</button>
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg')">選手2</button>
  </div>

  <script>
    function changePlayer(photoPath) {
      document.getElementById('playerPhoto').src = photoPath;
    }
  </script>
</body>
</html>
