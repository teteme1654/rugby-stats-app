<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選手紹介スライド - プロトタイプ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo', sans-serif;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .slide-container {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: white;
      transform: scale(0.5);
      transform-origin: center;
    }

    /* 背景画像 */
    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }



    /* 背番号 */
    .jersey-number {
      position: absolute;
      left: 120px;
      top: 175px;
      color: white;
      font-size: 72px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    /* チームロゴ */
    .team-logo {
      position: absolute;
      left: 55px;
      top: 280px;
      width: 110px;
      height: 110px;
      object-fit: contain;
      z-index: 10;
    }

    /* 選手名（日本語） */
    .name-jp {
      position: absolute;
      left: 185px;
      top: 275px;
      color: white;
      font-size: 64px;
      font-weight: bold;
      z-index: 10;
      letter-spacing: 0.05em;
    }

    /* 選手名（英語） */
    .name-en {
      position: absolute;
      left: 185px;
      top: 345px;
      color: white;
      font-size: 34px;
      font-weight: bold;
      z-index: 10;
    }

    /* ポジション */
    .position {
      position: absolute;
      right: 600px;
      top: 300px;
      color: white;
      font-size: 44px;
      font-weight: bold;
      z-index: 10;
    }

    /* 選手写真 */
    .player-photo {
      position: absolute;
      top: 50px;
      right: 100px;
      width: 500px;
      height: 700px;
      object-fit: cover;
      z-index: 5;
      
      /* 白背景除去 */
      mix-blend-mode: multiply;
    }

    /* コントロールパネル */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) scale(2);
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    .controls button {
      padding: 10px 20px;
      font-size: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      background: #5568d3;
    }

    /* 調整パネル */
    .adjust-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      color: white;
      max-height: 90vh;
      overflow-y: auto;
      font-size: 12px;
      width: 300px;
    }

    .adjust-panel h3 {
      margin: 10px 0 5px 0;
      font-size: 14px;
      color: #667eea;
      border-bottom: 1px solid #667eea;
      padding-bottom: 5px;
    }

    .adjust-panel label {
      display: block;
      margin: 5px 0;
      font-size: 11px;
    }

    .adjust-panel input[type="range"] {
      width: 100%;
      margin: 5px 0;
    }

    .adjust-panel input[type="number"] {
      width: 60px;
      padding: 3px;
      margin-left: 10px;
      background: #333;
      color: white;
      border: 1px solid #666;
      border-radius: 3px;
    }

    .adjust-panel button {
      width: 100%;
      padding: 8px;
      margin: 10px 0 5px 0;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .adjust-panel button:hover {
      background: #5568d3;
    }

    .toggle-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .toggle-panel:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 背景画像 -->
    <img src="stats/images/ui/bg_visitor.jpg" alt="Background" class="background">

    <!-- 背番号 -->
    <div class="jersey-number" id="jerseyNo">No.1</div>

    <!-- チームロゴ -->
    <img src="stats/images/logo/サンゴリアス.png" alt="チームロゴ" class="team-logo">

    <!-- 選手名（日本語） -->
    <div class="name-jp" id="nameJp">平野 叶翔</div>

    <!-- 選手名（英語） -->
    <div class="name-en" id="nameEn">Kanato Hirano</div>

    <!-- ポジション -->
    <div class="position" id="position">PR／プロップ</div>

    <!-- 選手写真 -->
    <img src="stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg" alt="選手写真" class="player-photo" id="playerPhoto">
  </div>

  <!-- コントロールパネル -->
  <div class="controls">
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg', '1', '平野 叶翔', 'Kanato Hirano', 'PR／プロップ')">平野 叶翔</button>
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg', '15', 'テスト 選手', 'Test Player', 'FB／フルバック')">テスト選手</button>
  </div>

  <!-- 調整パネル表示切替ボタン -->
  <div class="toggle-panel" onclick="toggleAdjustPanel()">⚙️ 調整パネル</div>

  <!-- 調整パネル -->
  <div class="adjust-panel" id="adjustPanel" style="display: none;">
    <h3>背番号</h3>
    <label>左: <input type="range" id="jerseyLeft" min="0" max="500" value="120" oninput="updatePosition()"><input type="number" id="jerseyLeftNum" value="120" onchange="syncSlider('jerseyLeft')">px</label>
    <label>上: <input type="range" id="jerseyTop" min="0" max="500" value="175" oninput="updatePosition()"><input type="number" id="jerseyTopNum" value="175" onchange="syncSlider('jerseyTop')">px</label>
    <label>サイズ: <input type="range" id="jerseySize" min="30" max="120" value="72" oninput="updatePosition()"><input type="number" id="jerseySizeNum" value="72" onchange="syncSlider('jerseySize')">px</label>

    <h3>チームロゴ</h3>
    <label>左: <input type="range" id="logoLeft" min="0" max="500" value="55" oninput="updatePosition()"><input type="number" id="logoLeftNum" value="55" onchange="syncSlider('logoLeft')">px</label>
    <label>上: <input type="range" id="logoTop" min="0" max="500" value="280" oninput="updatePosition()"><input type="number" id="logoTopNum" value="280" onchange="syncSlider('logoTop')">px</label>
    <label>サイズ: <input type="range" id="logoSize" min="50" max="200" value="110" oninput="updatePosition()"><input type="number" id="logoSizeNum" value="110" onchange="syncSlider('logoSize')">px</label>

    <h3>選手名（日本語）</h3>
    <label>左: <input type="range" id="nameJpLeft" min="0" max="800" value="185" oninput="updatePosition()"><input type="number" id="nameJpLeftNum" value="185" onchange="syncSlider('nameJpLeft')">px</label>
    <label>上: <input type="range" id="nameJpTop" min="0" max="500" value="275" oninput="updatePosition()"><input type="number" id="nameJpTopNum" value="275" onchange="syncSlider('nameJpTop')">px</label>
    <label>サイズ: <input type="range" id="nameJpSize" min="30" max="100" value="64" oninput="updatePosition()"><input type="number" id="nameJpSizeNum" value="64" onchange="syncSlider('nameJpSize')">px</label>

    <h3>選手名（英語）</h3>
    <label>左: <input type="range" id="nameEnLeft" min="0" max="800" value="185" oninput="updatePosition()"><input type="number" id="nameEnLeftNum" value="185" onchange="syncSlider('nameEnLeft')">px</label>
    <label>上: <input type="range" id="nameEnTop" min="0" max="500" value="345" oninput="updatePosition()"><input type="number" id="nameEnTopNum" value="345" onchange="syncSlider('nameEnTop')">px</label>
    <label>サイズ: <input type="range" id="nameEnSize" min="20" max="80" value="34" oninput="updatePosition()"><input type="number" id="nameEnSizeNum" value="34" onchange="syncSlider('nameEnSize')">px</label>

    <h3>ポジション</h3>
    <label>右: <input type="range" id="posRight" min="400" max="1000" value="600" oninput="updatePosition()"><input type="number" id="posRightNum" value="600" onchange="syncSlider('posRight')">px</label>
    <label>上: <input type="range" id="posTop" min="0" max="500" value="300" oninput="updatePosition()"><input type="number" id="posTopNum" value="300" onchange="syncSlider('posTop')">px</label>
    <label>サイズ: <input type="range" id="posSize" min="20" max="80" value="44" oninput="updatePosition()"><input type="number" id="posSizeNum" value="44" onchange="syncSlider('posSize')">px</label>

    <button onclick="copyCSS()">📋 CSS コピー</button>
    <button onclick="resetPosition()">🔄 リセット</button>
  </div>

  <script>
    function changePlayer(photoPath, jerseyNo, nameJp, nameEn, position) {
      document.getElementById('playerPhoto').src = photoPath;
      document.getElementById('jerseyNo').textContent = 'No.' + jerseyNo;
      document.getElementById('nameJp').textContent = nameJp;
      document.getElementById('nameEn').textContent = nameEn;
      document.getElementById('position').textContent = position;
    }

    function toggleAdjustPanel() {
      const panel = document.getElementById('adjustPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function syncSlider(id) {
      const slider = document.getElementById(id);
      const num = document.getElementById(id + 'Num');
      slider.value = num.value;
      updatePosition();
    }

    function updatePosition() {
      // 背番号
      const jerseyLeft = document.getElementById('jerseyLeft').value;
      const jerseyTop = document.getElementById('jerseyTop').value;
      const jerseySize = document.getElementById('jerseySize').value;
      document.getElementById('jerseyLeftNum').value = jerseyLeft;
      document.getElementById('jerseyTopNum').value = jerseyTop;
      document.getElementById('jerseySizeNum').value = jerseySize;
      const jersey = document.querySelector('.jersey-number');
      jersey.style.left = jerseyLeft + 'px';
      jersey.style.top = jerseyTop + 'px';
      jersey.style.fontSize = jerseySize + 'px';

      // ロゴ
      const logoLeft = document.getElementById('logoLeft').value;
      const logoTop = document.getElementById('logoTop').value;
      const logoSize = document.getElementById('logoSize').value;
      document.getElementById('logoLeftNum').value = logoLeft;
      document.getElementById('logoTopNum').value = logoTop;
      document.getElementById('logoSizeNum').value = logoSize;
      const logo = document.querySelector('.team-logo');
      logo.style.left = logoLeft + 'px';
      logo.style.top = logoTop + 'px';
      logo.style.width = logoSize + 'px';
      logo.style.height = logoSize + 'px';

      // 選手名（日本語）
      const nameJpLeft = document.getElementById('nameJpLeft').value;
      const nameJpTop = document.getElementById('nameJpTop').value;
      const nameJpSize = document.getElementById('nameJpSize').value;
      document.getElementById('nameJpLeftNum').value = nameJpLeft;
      document.getElementById('nameJpTopNum').value = nameJpTop;
      document.getElementById('nameJpSizeNum').value = nameJpSize;
      const nameJp = document.querySelector('.name-jp');
      nameJp.style.left = nameJpLeft + 'px';
      nameJp.style.top = nameJpTop + 'px';
      nameJp.style.fontSize = nameJpSize + 'px';

      // 選手名（英語）
      const nameEnLeft = document.getElementById('nameEnLeft').value;
      const nameEnTop = document.getElementById('nameEnTop').value;
      const nameEnSize = document.getElementById('nameEnSize').value;
      document.getElementById('nameEnLeftNum').value = nameEnLeft;
      document.getElementById('nameEnTopNum').value = nameEnTop;
      document.getElementById('nameEnSizeNum').value = nameEnSize;
      const nameEn = document.querySelector('.name-en');
      nameEn.style.left = nameEnLeft + 'px';
      nameEn.style.top = nameEnTop + 'px';
      nameEn.style.fontSize = nameEnSize + 'px';

      // ポジション
      const posRight = document.getElementById('posRight').value;
      const posTop = document.getElementById('posTop').value;
      const posSize = document.getElementById('posSize').value;
      document.getElementById('posRightNum').value = posRight;
      document.getElementById('posTopNum').value = posTop;
      document.getElementById('posSizeNum').value = posSize;
      const pos = document.querySelector('.position');
      pos.style.right = posRight + 'px';
      pos.style.top = posTop + 'px';
      pos.style.fontSize = posSize + 'px';
    }

    function copyCSS() {
      const css = `
/* 背番号 */
.jersey-number {
  left: ${document.getElementById('jerseyLeft').value}px;
  top: ${document.getElementById('jerseyTop').value}px;
  font-size: ${document.getElementById('jerseySize').value}px;
}

/* チームロゴ */
.team-logo {
  left: ${document.getElementById('logoLeft').value}px;
  top: ${document.getElementById('logoTop').value}px;
  width: ${document.getElementById('logoSize').value}px;
  height: ${document.getElementById('logoSize').value}px;
}

/* 選手名（日本語） */
.name-jp {
  left: ${document.getElementById('nameJpLeft').value}px;
  top: ${document.getElementById('nameJpTop').value}px;
  font-size: ${document.getElementById('nameJpSize').value}px;
}

/* 選手名（英語） */
.name-en {
  left: ${document.getElementById('nameEnLeft').value}px;
  top: ${document.getElementById('nameEnTop').value}px;
  font-size: ${document.getElementById('nameEnSize').value}px;
}

/* ポジション */
.position {
  right: ${document.getElementById('posRight').value}px;
  top: ${document.getElementById('posTop').value}px;
  font-size: ${document.getElementById('posSize').value}px;
}`;
      navigator.clipboard.writeText(css).then(() => {
        alert('CSSをコピーしました！');
      });
    }

    function resetPosition() {
      document.getElementById('jerseyLeft').value = 120;
      document.getElementById('jerseyTop').value = 175;
      document.getElementById('jerseySize').value = 72;
      document.getElementById('logoLeft').value = 55;
      document.getElementById('logoTop').value = 280;
      document.getElementById('logoSize').value = 110;
      document.getElementById('nameJpLeft').value = 185;
      document.getElementById('nameJpTop').value = 275;
      document.getElementById('nameJpSize').value = 64;
      document.getElementById('nameEnLeft').value = 185;
      document.getElementById('nameEnTop').value = 345;
      document.getElementById('nameEnSize').value = 34;
      document.getElementById('posRight').value = 600;
      document.getElementById('posTop').value = 300;
      document.getElementById('posSize').value = 44;
      updatePosition();
    }
  </script>
</body>
</html>
