<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選手紹介スライド - プロトタイプ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo', sans-serif;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .slide-container {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: white;
      transform: scale(0.5);
      transform-origin: center;
    }

    /* 背景画像 */
    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }



    /* 背番号 */
    .jersey-number {
      position: absolute;
      left: 55px;
      top: 145px;
      color: white;
      font-size: 72px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    /* チームロゴ */
    .team-logo {
      position: absolute;
      left: 25px;
      top: 245px;
      width: 80px;
      height: 80px;
      object-fit: contain;
      z-index: 10;
    }

    /* 選手名（日本語） */
    .name-jp {
      position: absolute;
      left: 115px;
      top: 245px;
      color: white;
      font-size: 48px;
      font-weight: bold;
      z-index: 10;
      letter-spacing: 0.05em;
    }

    /* 選手名（英語） */
    .name-en {
      position: absolute;
      left: 115px;
      top: 295px;
      color: white;
      font-size: 28px;
      font-weight: bold;
      z-index: 10;
    }

    /* ポジション */
    .position {
      position: absolute;
      right: 650px;
      top: 265px;
      color: white;
      font-size: 36px;
      font-weight: bold;
      z-index: 10;
    }

    /* 選手写真 */
    .player-photo {
      position: absolute;
      top: 50px;
      right: 100px;
      width: 500px;
      height: 700px;
      object-fit: cover;
      z-index: 5;
      
      /* 白背景除去 */
      mix-blend-mode: multiply;
    }

    /* コントロールパネル */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) scale(2);
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    .controls button {
      padding: 10px 20px;
      font-size: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 背景画像 -->
    <img src="stats/images/ui/bg_visitor.jpg" alt="Background" class="background">

    <!-- 背番号 -->
    <div class="jersey-number" id="jerseyNo">No.1</div>

    <!-- チームロゴ -->
    <img src="stats/images/logo/サンゴリアス.png" alt="チームロゴ" class="team-logo">

    <!-- 選手名（日本語） -->
    <div class="name-jp" id="nameJp">平野 叶翔</div>

    <!-- 選手名（英語） -->
    <div class="name-en" id="nameEn">Kanato Hirano</div>

    <!-- ポジション -->
    <div class="position" id="position">PR／プロップ</div>

    <!-- 選手写真 -->
    <img src="stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg" alt="選手写真" class="player-photo" id="playerPhoto">
  </div>

  <!-- コントロールパネル -->
  <div class="controls">
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg', '1', '平野 叶翔', 'Kanato Hirano', 'PR／プロップ')">平野 叶翔</button>
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg', '15', 'テスト 選手', 'Test Player', 'FB／フルバック')">テスト選手</button>
  </div>

  <script>
    function changePlayer(photoPath, jerseyNo, nameJp, nameEn, position) {
      document.getElementById('playerPhoto').src = photoPath;
      document.getElementById('jerseyNo').textContent = 'No.' + jerseyNo;
      document.getElementById('nameJp').textContent = nameJp;
      document.getElementById('nameEn').textContent = nameEn;
      document.getElementById('position').textContent = position;
    }
  </script>
</body>
</html>
