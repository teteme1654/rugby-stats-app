<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選手紹介スライド - プロトタイプ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Meiryo', sans-serif;
      background: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .slide-container {
      width: 1920px;
      height: 1080px;
      position: relative;
      background: white;
      transform: scale(0.5);
      transform-origin: center;
    }

    /* 背景画像 */
    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }



    /* 背番号 */
    .jersey-number {
      position: absolute;
      left: 131px;
      top: 293px;
      color: white;
      font-size: 111px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    /* チームロゴ */
    .team-logo {
      position: absolute;
      left: 41px;
      top: 500px;
      width: 200px;
      height: 200px;
      object-fit: contain;
      z-index: 10;
    }

    /* 選手名（日本語） */
    .name-jp {
      position: absolute;
      left: 325px;
      top: 500px;
      color: white;
      font-size: 100px;
      font-weight: bold;
      z-index: 10;
      letter-spacing: 0.05em;
    }

    /* 選手名（英語） */
    .name-en {
      position: absolute;
      left: 318px;
      top: 600px;
      color: white;
      font-size: 51px;
      font-weight: bold;
      z-index: 10;
    }

    /* ポジション */
    .position {
      position: absolute;
      right: 492px;
      top: 550px;
      color: white;
      font-size: 66px;
      font-weight: bold;
      z-index: 10;
    }

    /* 選手写真 */
    .player-photo {
      position: absolute;
      top: 50px;
      right: 100px;
      width: 500px;
      height: 700px;
      object-fit: cover;
      z-index: 15;
      
      /* mix-blend-mode は使わない（Canvas で透過処理する） */
    }

    /* コントロールパネル */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) scale(2);
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      display: flex;
      gap: 10px;
    }

    .controls button {
      padding: 10px 20px;
      font-size: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      background: #5568d3;
    }

    /* 調整パネル */
    .adjust-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.9);
      padding: 20px;
      border-radius: 10px;
      z-index: 1000;
      color: white;
      max-height: 90vh;
      overflow-y: auto;
      font-size: 12px;
      width: 300px;
    }

    .adjust-panel h3 {
      margin: 10px 0 5px 0;
      font-size: 14px;
      color: #667eea;
      border-bottom: 1px solid #667eea;
      padding-bottom: 5px;
    }

    .adjust-panel label {
      display: block;
      margin: 5px 0;
      font-size: 11px;
    }

    .adjust-panel input[type="range"] {
      width: 100%;
      margin: 5px 0;
    }

    .adjust-panel input[type="number"] {
      width: 60px;
      padding: 3px;
      margin-left: 10px;
      background: #333;
      color: white;
      border: 1px solid #666;
      border-radius: 3px;
    }

    .adjust-panel button {
      width: 100%;
      padding: 8px;
      margin: 10px 0 5px 0;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .adjust-panel button:hover {
      background: #5568d3;
    }

    .toggle-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .toggle-panel:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 背景画像 -->
    <img src="stats/images/ui/bg_visitor.jpg" alt="Background" class="background">

    <!-- 背番号 -->
    <div class="jersey-number" id="jerseyNo">No.1</div>

    <!-- チームロゴ -->
    <img src="stats/images/logo/サンゴリアス.png" alt="チームロゴ" class="team-logo">

    <!-- 選手名（日本語） -->
    <div class="name-jp" id="nameJp">平野 叶翔</div>

    <!-- 選手名（英語） -->
    <div class="name-en" id="nameEn">Kanato Hirano</div>

    <!-- ポジション -->
    <div class="position" id="position">PR／プロップ</div>

    <!-- 選手写真 -->
    <img src="stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①_nobg.png" alt="選手写真" class="player-photo" id="playerPhoto">
  </div>

  <!-- コントロールパネル -->
  <div class="controls">
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg', '1', '平野 叶翔', 'Kanato Hirano', 'PR／プロップ')">平野 叶翔（旧形式）</button>
    <button onclick="changePlayer('stats/images/players/1763948510837-_-SB_Bunkei_Kaku_①.jpg', '15', 'テスト 選手', 'Test Player', 'FB／フルバック')">テスト選手（旧形式）</button>
    <br>
    <button onclick="changePlayer('ピーター・ショルツ', '11', 'ピーター・ショルツ', 'Peter Scholtz', 'FB／フルバック')">ピーター・ショルツ（Fuzzy Match）</button>
    <button onclick="changePlayer('淺岡俊亮', '2', '淺岡 俊亮', 'Shunsuke Asaoka', 'HO／フッカー')">淺岡俊亮（Fuzzy Match）</button>
  </div>

  <!-- 調整パネル表示切替ボタン -->
  <div class="toggle-panel" onclick="toggleAdjustPanel()">⚙️ 調整パネル</div>

  <!-- 調整パネル -->
  <div class="adjust-panel" id="adjustPanel" style="display: none;">
    <h3>背番号</h3>
    <label>左: <input type="range" id="jerseyLeft" min="0" max="800" value="131" oninput="updatePosition()"><input type="number" id="jerseyLeftNum" value="131" onchange="syncSlider('jerseyLeft')">px</label>
    <label>上: <input type="range" id="jerseyTop" min="0" max="800" value="293" oninput="updatePosition()"><input type="number" id="jerseyTopNum" value="293" onchange="syncSlider('jerseyTop')">px</label>
    <label>サイズ: <input type="range" id="jerseySize" min="30" max="150" value="111" oninput="updatePosition()"><input type="number" id="jerseySizeNum" value="111" onchange="syncSlider('jerseySize')">px</label>

    <h3>チームロゴ</h3>
    <label>左: <input type="range" id="logoLeft" min="0" max="800" value="41" oninput="updatePosition()"><input type="number" id="logoLeftNum" value="41" onchange="syncSlider('logoLeft')">px</label>
    <label>上: <input type="range" id="logoTop" min="0" max="800" value="500" oninput="updatePosition()"><input type="number" id="logoTopNum" value="500" onchange="syncSlider('logoTop')">px</label>
    <label>サイズ: <input type="range" id="logoSize" min="50" max="300" value="200" oninput="updatePosition()"><input type="number" id="logoSizeNum" value="200" onchange="syncSlider('logoSize')">px</label>

    <h3>選手名（日本語）</h3>
    <label>左: <input type="range" id="nameJpLeft" min="0" max="1200" value="325" oninput="updatePosition()"><input type="number" id="nameJpLeftNum" value="325" onchange="syncSlider('nameJpLeft')">px</label>
    <label>上: <input type="range" id="nameJpTop" min="0" max="800" value="500" oninput="updatePosition()"><input type="number" id="nameJpTopNum" value="500" onchange="syncSlider('nameJpTop')">px</label>
    <label>サイズ: <input type="range" id="nameJpSize" min="30" max="150" value="100" oninput="updatePosition()"><input type="number" id="nameJpSizeNum" value="100" onchange="syncSlider('nameJpSize')">px</label>

    <h3>選手名（英語）</h3>
    <label>左: <input type="range" id="nameEnLeft" min="0" max="1200" value="318" oninput="updatePosition()"><input type="number" id="nameEnLeftNum" value="318" onchange="syncSlider('nameEnLeft')">px</label>
    <label>上: <input type="range" id="nameEnTop" min="0" max="800" value="600" oninput="updatePosition()"><input type="number" id="nameEnTopNum" value="600" onchange="syncSlider('nameEnTop')">px</label>
    <label>サイズ: <input type="range" id="nameEnSize" min="20" max="100" value="51" oninput="updatePosition()"><input type="number" id="nameEnSizeNum" value="51" onchange="syncSlider('nameEnSize')">px</label>

    <h3>ポジション</h3>
    <label>右: <input type="range" id="posRight" min="0" max="1400" value="492" oninput="updatePosition()"><input type="number" id="posRightNum" value="492" onchange="syncSlider('posRight')">px</label>
    <label>上: <input type="range" id="posTop" min="0" max="800" value="550" oninput="updatePosition()"><input type="number" id="posTopNum" value="550" onchange="syncSlider('posTop')">px</label>
    <label>サイズ: <input type="range" id="posSize" min="20" max="100" value="66" oninput="updatePosition()"><input type="number" id="posSizeNum" value="66" onchange="syncSlider('posSize')">px</label>

    <h3>選手写真</h3>
    <label>右: <input type="range" id="photoRight" min="0" max="1000" value="100" oninput="updatePosition()"><input type="number" id="photoRightNum" value="100" onchange="syncSlider('photoRight')">px</label>
    <label>上: <input type="range" id="photoTop" min="0" max="800" value="50" oninput="updatePosition()"><input type="number" id="photoTopNum" value="50" onchange="syncSlider('photoTop')">px</label>
    <label>幅: <input type="range" id="photoWidth" min="200" max="1000" value="500" oninput="updatePosition()"><input type="number" id="photoWidthNum" value="500" onchange="syncSlider('photoWidth')">px</label>
    <label>高さ: <input type="range" id="photoHeight" min="200" max="1000" value="700" oninput="updatePosition()"><input type="number" id="photoHeightNum" value="700" onchange="syncSlider('photoHeight')">px</label>

    <button onclick="copyCSS()">📋 CSS コピー</button>
    <button onclick="resetPosition()">🔄 リセット</button>
    <button onclick="saveLayout()">💾 設定を保存</button>
    <button onclick="loadLayout()">📂 設定を読み込み</button>
  </div>

  <script>
    // 画像読み込み時の処理
    window.addEventListener('DOMContentLoaded', function() {
      // 初期画像は透過PNG を想定（Canvas 処理不要）
    });

    /**
     * 選手画像パスを自動解決（Fuzzy Match）
     * 優先順位：
     *   1. [Name].png (完全一致)
     *   2. [Name(スペースなし)].png (スペース削除)
     *   3. [Name(スペースなし)]_nobg.png (透過PNG)
     *   4. デフォルト画像 (no_image.png)
     * 
     * @param {string} playerName - 選手名（日本語）
     * @param {string} teamDir - チームディレクトリ（例: "stats/images/players/静岡BR"）
     * @returns {Promise<string>} - 解決された画像パス
     */
    async function resolvePlayerImage(playerName, teamDir = 'stats/images/players/test_team') {
      // Electron 環境の場合
      if (window.electronAPI && window.electronAPI.resolvePlayerImage) {
        return await window.electronAPI.resolvePlayerImage(playerName, teamDir);
      }
      
      // ブラウザ単体の場合（プロトタイプ用）
      const nameNoSpace = playerName.replace(/\s+/g, '');
      
      const candidates = [
        `${teamDir}/${playerName}.png`,
        `${teamDir}/${nameNoSpace}.png`,
        `${teamDir}/nobg/${nameNoSpace}_nobg.png`,
        'assets/images/no_image.png'
      ];
      
      // 実際の存在チェックはできないので、3番目を返す（透過PNG想定）
      return candidates[2];
    }

    async function changePlayer(photoPathOrName, jerseyNo, nameJp, nameEn, position) {
      let photoPath = photoPathOrName;
      
      // 日本語名が渡された場合は Fuzzy Match で解決
      if (!photoPathOrName.includes('/') && !photoPathOrName.includes('.')) {
        photoPath = await resolvePlayerImage(photoPathOrName, 'stats/images/players/静岡BR');
      } else {
        // パスが渡された場合は .jpg/.jpeg/.png を _nobg.png に自動置き換え
        photoPath = photoPathOrName.replace(/\.(jpg|jpeg|png)$/i, '_nobg.png');
      }
      
      const photoImg = document.getElementById('playerPhoto');
      photoImg.src = photoPath;
      
      // 透過PNG を使用するので Canvas 処理は不要
      // （背景除去済みの画像を直接表示）
      
      // 他の情報更新
      document.getElementById('jerseyNo').textContent = 'No.' + jerseyNo;
      document.getElementById('nameJp').textContent = nameJp;
      document.getElementById('nameEn').textContent = nameEn;
      document.getElementById('position').textContent = position;
    }

    function toggleAdjustPanel() {
      const panel = document.getElementById('adjustPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function syncSlider(id) {
      const slider = document.getElementById(id);
      const num = document.getElementById(id + 'Num');
      slider.value = num.value;
      updatePosition();
    }

    function updatePosition() {
      // 背番号
      const jerseyLeft = document.getElementById('jerseyLeft').value;
      const jerseyTop = document.getElementById('jerseyTop').value;
      const jerseySize = document.getElementById('jerseySize').value;
      document.getElementById('jerseyLeftNum').value = jerseyLeft;
      document.getElementById('jerseyTopNum').value = jerseyTop;
      document.getElementById('jerseySizeNum').value = jerseySize;
      const jersey = document.querySelector('.jersey-number');
      jersey.style.left = jerseyLeft + 'px';
      jersey.style.top = jerseyTop + 'px';
      jersey.style.fontSize = jerseySize + 'px';

      // ロゴ
      const logoLeft = document.getElementById('logoLeft').value;
      const logoTop = document.getElementById('logoTop').value;
      const logoSize = document.getElementById('logoSize').value;
      document.getElementById('logoLeftNum').value = logoLeft;
      document.getElementById('logoTopNum').value = logoTop;
      document.getElementById('logoSizeNum').value = logoSize;
      const logo = document.querySelector('.team-logo');
      logo.style.left = logoLeft + 'px';
      logo.style.top = logoTop + 'px';
      logo.style.width = logoSize + 'px';
      logo.style.height = logoSize + 'px';

      // 選手名（日本語）
      const nameJpLeft = document.getElementById('nameJpLeft').value;
      const nameJpTop = document.getElementById('nameJpTop').value;
      const nameJpSize = document.getElementById('nameJpSize').value;
      document.getElementById('nameJpLeftNum').value = nameJpLeft;
      document.getElementById('nameJpTopNum').value = nameJpTop;
      document.getElementById('nameJpSizeNum').value = nameJpSize;
      const nameJp = document.querySelector('.name-jp');
      nameJp.style.left = nameJpLeft + 'px';
      nameJp.style.top = nameJpTop + 'px';
      nameJp.style.fontSize = nameJpSize + 'px';

      // 選手名（英語）
      const nameEnLeft = document.getElementById('nameEnLeft').value;
      const nameEnTop = document.getElementById('nameEnTop').value;
      const nameEnSize = document.getElementById('nameEnSize').value;
      document.getElementById('nameEnLeftNum').value = nameEnLeft;
      document.getElementById('nameEnTopNum').value = nameEnTop;
      document.getElementById('nameEnSizeNum').value = nameEnSize;
      const nameEn = document.querySelector('.name-en');
      nameEn.style.left = nameEnLeft + 'px';
      nameEn.style.top = nameEnTop + 'px';
      nameEn.style.fontSize = nameEnSize + 'px';

      // ポジション
      const posRight = document.getElementById('posRight').value;
      const posTop = document.getElementById('posTop').value;
      const posSize = document.getElementById('posSize').value;
      document.getElementById('posRightNum').value = posRight;
      document.getElementById('posTopNum').value = posTop;
      document.getElementById('posSizeNum').value = posSize;
      const pos = document.querySelector('.position');
      pos.style.right = posRight + 'px';
      pos.style.top = posTop + 'px';
      pos.style.fontSize = posSize + 'px';

      // 選手写真
      const photoRight = document.getElementById('photoRight').value;
      const photoTop = document.getElementById('photoTop').value;
      const photoWidth = document.getElementById('photoWidth').value;
      const photoHeight = document.getElementById('photoHeight').value;
      document.getElementById('photoRightNum').value = photoRight;
      document.getElementById('photoTopNum').value = photoTop;
      document.getElementById('photoWidthNum').value = photoWidth;
      document.getElementById('photoHeightNum').value = photoHeight;
      const photo = document.querySelector('.player-photo');
      photo.style.right = photoRight + 'px';
      photo.style.top = photoTop + 'px';
      photo.style.width = photoWidth + 'px';
      photo.style.height = photoHeight + 'px';
    }

    function copyCSS() {
      const css = `
/* 背番号 */
.jersey-number {
  left: ${document.getElementById('jerseyLeft').value}px;
  top: ${document.getElementById('jerseyTop').value}px;
  font-size: ${document.getElementById('jerseySize').value}px;
}

/* チームロゴ */
.team-logo {
  left: ${document.getElementById('logoLeft').value}px;
  top: ${document.getElementById('logoTop').value}px;
  width: ${document.getElementById('logoSize').value}px;
  height: ${document.getElementById('logoSize').value}px;
}

/* 選手名（日本語） */
.name-jp {
  left: ${document.getElementById('nameJpLeft').value}px;
  top: ${document.getElementById('nameJpTop').value}px;
  font-size: ${document.getElementById('nameJpSize').value}px;
}

/* 選手名（英語） */
.name-en {
  left: ${document.getElementById('nameEnLeft').value}px;
  top: ${document.getElementById('nameEnTop').value}px;
  font-size: ${document.getElementById('nameEnSize').value}px;
}

/* ポジション */
.position {
  right: ${document.getElementById('posRight').value}px;
  top: ${document.getElementById('posTop').value}px;
  font-size: ${document.getElementById('posSize').value}px;
}

/* 選手写真 */
.player-photo {
  right: ${document.getElementById('photoRight').value}px;
  top: ${document.getElementById('photoTop').value}px;
  width: ${document.getElementById('photoWidth').value}px;
  height: ${document.getElementById('photoHeight').value}px;
}`;
      navigator.clipboard.writeText(css).then(() => {
        alert('CSSをコピーしました！');
      });
    }

    function resetPosition() {
      document.getElementById('jerseyLeft').value = 131;
      document.getElementById('jerseyTop').value = 293;
      document.getElementById('jerseySize').value = 111;
      document.getElementById('logoLeft').value = 41;
      document.getElementById('logoTop').value = 500;
      document.getElementById('logoSize').value = 200;
      document.getElementById('nameJpLeft').value = 325;
      document.getElementById('nameJpTop').value = 500;
      document.getElementById('nameJpSize').value = 100;
      document.getElementById('nameEnLeft').value = 318;
      document.getElementById('nameEnTop').value = 600;
      document.getElementById('nameEnSize').value = 51;
      document.getElementById('posRight').value = 492;
      document.getElementById('posTop').value = 550;
      document.getElementById('posSize').value = 66;
      document.getElementById('photoRight').value = 100;
      document.getElementById('photoTop').value = 50;
      document.getElementById('photoWidth').value = 500;
      document.getElementById('photoHeight').value = 700;
      updatePosition();
    }

    /**
     * レイアウト設定を保存
     * Electron 環境: config/visitor_layout.json に保存
     * ブラウザ単体: localStorage に保存
     */
    function saveLayout() {
      const config = {
        jerseyNumber: {
          left: parseInt(document.getElementById('jerseyLeft').value),
          top: parseInt(document.getElementById('jerseyTop').value),
          size: parseInt(document.getElementById('jerseySize').value)
        },
        teamLogo: {
          left: parseInt(document.getElementById('logoLeft').value),
          top: parseInt(document.getElementById('logoTop').value),
          size: parseInt(document.getElementById('logoSize').value)
        },
        nameJp: {
          left: parseInt(document.getElementById('nameJpLeft').value),
          top: parseInt(document.getElementById('nameJpTop').value),
          size: parseInt(document.getElementById('nameJpSize').value)
        },
        nameEn: {
          left: parseInt(document.getElementById('nameEnLeft').value),
          top: parseInt(document.getElementById('nameEnTop').value),
          size: parseInt(document.getElementById('nameEnSize').value)
        },
        position: {
          right: parseInt(document.getElementById('posRight').value),
          top: parseInt(document.getElementById('posTop').value),
          size: parseInt(document.getElementById('posSize').value)
        },
        playerPhoto: {
          right: parseInt(document.getElementById('photoRight').value),
          top: parseInt(document.getElementById('photoTop').value),
          width: parseInt(document.getElementById('photoWidth').value),
          height: parseInt(document.getElementById('photoHeight').value)
        }
      };

      // Electron 環境の場合
      if (window.electronAPI && window.electronAPI.saveLayoutConfig) {
        window.electronAPI.saveLayoutConfig('visitor', config)
          .then(() => alert('✅ 設定を保存しました！'))
          .catch(err => alert('❌ 保存失敗: ' + err));
      } else {
        // ブラウザ単体の場合は localStorage に保存
        localStorage.setItem('visitor_layout', JSON.stringify(config));
        alert('✅ 設定を保存しました（localStorage）');
      }
    }

    /**
     * レイアウト設定を読み込み
     * Electron 環境: config/visitor_layout.json から読み込み
     * ブラウザ単体: localStorage から読み込み
     */
    function loadLayout() {
      // Electron 環境の場合
      if (window.electronAPI && window.electronAPI.loadLayoutConfig) {
        window.electronAPI.loadLayoutConfig('visitor')
          .then(config => {
            if (config) {
              applyLayoutConfig(config);
              alert('✅ 設定を読み込みました！');
            } else {
              alert('⚠️ 保存された設定がありません');
            }
          })
          .catch(err => alert('❌ 読み込み失敗: ' + err));
      } else {
        // ブラウザ単体の場合は localStorage から読み込み
        const saved = localStorage.getItem('visitor_layout');
        if (saved) {
          const config = JSON.parse(saved);
          applyLayoutConfig(config);
          alert('✅ 設定を読み込みました（localStorage）');
        } else {
          alert('⚠️ 保存された設定がありません');
        }
      }
    }

    /**
     * レイアウト設定を UI に反映
     */
    function applyLayoutConfig(config) {
      if (config.jerseyNumber) {
        document.getElementById('jerseyLeft').value = config.jerseyNumber.left;
        document.getElementById('jerseyTop').value = config.jerseyNumber.top;
        document.getElementById('jerseySize').value = config.jerseyNumber.size;
      }
      if (config.teamLogo) {
        document.getElementById('logoLeft').value = config.teamLogo.left;
        document.getElementById('logoTop').value = config.teamLogo.top;
        document.getElementById('logoSize').value = config.teamLogo.size;
      }
      if (config.nameJp) {
        document.getElementById('nameJpLeft').value = config.nameJp.left;
        document.getElementById('nameJpTop').value = config.nameJp.top;
        document.getElementById('nameJpSize').value = config.nameJp.size;
      }
      if (config.nameEn) {
        document.getElementById('nameEnLeft').value = config.nameEn.left;
        document.getElementById('nameEnTop').value = config.nameEn.top;
        document.getElementById('nameEnSize').value = config.nameEn.size;
      }
      if (config.position) {
        document.getElementById('posRight').value = config.position.right;
        document.getElementById('posTop').value = config.position.top;
        document.getElementById('posSize').value = config.position.size;
      }
      if (config.playerPhoto) {
        document.getElementById('photoRight').value = config.playerPhoto.right;
        document.getElementById('photoTop').value = config.playerPhoto.top;
        document.getElementById('photoWidth').value = config.playerPhoto.width;
        document.getElementById('photoHeight').value = config.playerPhoto.height;
      }
      updatePosition();
    }

    // ページ読み込み時に設定を自動復元
    window.addEventListener('DOMContentLoaded', function() {
      // localStorage に保存されている設定があれば自動読み込み
      const saved = localStorage.getItem('visitor_layout');
      if (saved) {
        try {
          const config = JSON.parse(saved);
          applyLayoutConfig(config);
          console.log('✅ 保存された設定を自動復元しました');
        } catch (e) {
          console.error('設定の復元に失敗:', e);
        }
      }
    });
  </script>
</body>
</html>
